mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml

# -------------------------------------------------------
# 维度路由配置
# dimensionKey = {module}_{domain}，由拦截器从 URL /{module}/{domain}/... 自动提取
# tableName    = 对应的物理表名
# dataSource   = 二期分库时填写（beta / comm），一期留空
# -------------------------------------------------------
dimension:
  default-key: beta_normal
  mappings:
    beta_normal:
      tableName: beta_normal_fault
      description: Beta普通故障
    beta_perf:
      tableName: beta_perf_fault
      description: Beta性能故障
    beta_third:
      tableName: beta_third_fault
      description: Beta三方故障
    comm_normal:
      tableName: comm_normal_fault
      description: Comm普通故障
    comm_perf:
      tableName: comm_perf_fault
      description: Comm性能故障
    comm_third:
      tableName: comm_third_fault
      description: Comm三方故障
